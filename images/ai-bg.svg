<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d0d24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow filters -->
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <filter id="glowPurple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <filter id="glowPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Neural network gradient -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0"/>
    </radialGradient>
    
    <radialGradient id="purpleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7b2ff7;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.03">
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00f0ff" stroke-width="1"/>
    </pattern>
    <rect width="1920" height="1080" fill="url(#grid)"/>
  </g>
  
  <!-- Large background glows -->
  <ellipse cx="300" cy="200" rx="400" ry="350" fill="url(#purpleGlow)" opacity="0.4"/>
  <ellipse cx="1600" cy="800" rx="450" ry="380" fill="url(#purpleGlow)" opacity="0.3"/>
  <ellipse cx="960" cy="540" rx="500" ry="420" fill="url(#nodeGlow)" opacity="0.08"/>

  <!-- Neural Network Lines -->
  <g stroke="#00f0ff" stroke-width="0.5" opacity="0.15">
    <!-- Left cluster -->
    <line x1="150" y1="150" x2="280" y2="250"/>
    <line x1="150" y1="150" x2="200" y2="320"/>
    <line x1="280" y1="250" x2="380" y2="180"/>
    <line x1="280" y1="250" x2="350" y2="360"/>
    <line x1="200" y1="320" x2="350" y2="360"/>
    <line x1="380" y1="180" x2="480" y2="280"/>
    <line x1="350" y1="360" x2="480" y2="280"/>
    
    <!-- Right cluster -->
    <line x1="1700" y1="700" x2="1580" y2="600"/>
    <line x1="1700" y1="700" x2="1750" y2="550"/>
    <line x1="1580" y1="600" x2="1450" y2="650"/>
    <line x1="1580" y1="600" x2="1520" y2="480"/>
    <line x1="1750" y1="550" x2="1650" y2="450"/>
    <line x1="1450" y1="650" x2="1350" y2="550"/>
    <line x1="1520" y1="480" x2="1400" y2="500"/>
    
    <!-- Center connections -->
    <line x1="480" y1="280" x2="750" y2="400" stroke-dasharray="5,5"/>
    <line x1="1350" y1="550" x2="1150" y2="500" stroke-dasharray="5,5"/>
    <line x1="960" y1="540" x2="750" y2="400" opacity="0.08"/>
    <line x1="960" y1="540" x2="1150" y2="500" opacity="0.08"/>
  </g>

  <!-- AI Logo Elements - Claude (Anthropic) style - warm orange/coral -->
  <g transform="translate(120, 100)" filter="url(#glowCyan)" opacity="0.12">
    <circle cx="30" cy="30" r="25" fill="none" stroke="#d97757" stroke-width="2"/>
    <circle cx="30" cy="30" r="18" fill="#d97757" opacity="0.3"/>
    <text x="30" y="36" font-family="Arial, sans-serif" font-size="14" fill="#d97757" text-anchor="middle" font-weight="bold">C</text>
  </g>

  <!-- OpenAI style - green/teal swirl -->
  <g transform="translate(1750, 650)" filter="url(#glowPurple)" opacity="0.12">
    <path d="M30,10 Q45,10 45,25 Q45,35 35,38 Q20,42 20,28 Q20,18 32,18 Q40,18 40,26" fill="none" stroke="#10a37f" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Gemini style - blue/purple gradient star -->
  <g transform="translate(900, 80)" filter="url(#glowCyan)" opacity="0.1">
    <polygon points="30,5 36,22 54,22 39,33 44,51 30,41 16,51 21,33 6,22 24,22" fill="none" stroke="#4285f4" stroke-width="1.5"/>
    <polygon points="30,12 34,23 46,23 36,31 40,43 30,36 20,43 24,31 14,23 26,23" fill="#4285f4" opacity="0.2"/>
  </g>

  <!-- MiniMax style - orange/red geometric -->
  <g transform="translate(1650, 200)" filter="url(#glowPink)" opacity="0.1">
    <rect x="10" y="10" width="40" height="40" rx="8" fill="none" stroke="#ff6b35" stroke-width="2" transform="rotate(15, 30, 30)"/>
    <circle cx="30" cy="30" r="10" fill="#ff6b35" opacity="0.3"/>
  </g>

  <!-- GLM/Zhipu style - purple/blue tech -->
  <g transform="translate(250, 800)" filter="url(#glowPurple)" opacity="0.1">
    <polygon points="30,5 55,25 45,55 15,55 5,25" fill="none" stroke="#7b2ff7" stroke-width="2"/>
    <text x="30" y="35" font-family="monospace" font-size="11" fill="#7b2ff7" text-anchor="middle">GLM</text>
  </g>

  <!-- Embodied Robot figure -->
  <g transform="translate(1550, 900)" filter="url(#glowCyan)" opacity="0.06">
    <!-- Head -->
    <circle cx="30" cy="15" r="12" fill="none" stroke="#00f0ff" stroke-width="1.5"/>
    <circle cx="26" cy="13" r="2" fill="#00f0ff"/>
    <circle cx="34" cy="13" r="2" fill="#00f0ff"/>
    <!-- Body -->
    <line x1="30" y1="27" x2="30" y2="50" stroke="#00f0ff" stroke-width="1.5"/>
    <!-- Arms -->
    <line x1="30" y1="35" x2="12" y2="48" stroke="#00f0ff" stroke-width="1.5"/>
    <line x1="30" y1="35" x2="48" y2="48" stroke="#00f0ff" stroke-width="1.5"/>
    <!-- Legs -->
    <line x1="30" y1="50" x2="18" y2="72" stroke="#00f0ff" stroke-width="1.5"/>
    <line x1="30" y1="50" x2="42" y2="72" stroke="#00f0ff" stroke-width="1.5"/>
  </g>

  <!-- Floating particles / data nodes -->
  <g filter="url(#glowCyan)">
    <circle cx="200" cy="500" r="3" fill="#00f0ff" opacity="0.4"/>
    <circle cx="450" cy="650" r="2" fill="#00f0ff" opacity="0.3"/>
    <circle cx="700" cy="200" r="2.5" fill="#7b2ff7" opacity="0.35"/>
    <circle cx="1100" cy="850" r="3" fill="#00f0ff" opacity="0.25"/>
    <circle cx="1300" cy="150" r="2" fill="#7b2ff7" opacity="0.3"/>
    <circle cx="1500" cy="400" r="2.5" fill="#ff2d75" opacity="0.2"/>
    <circle cx="850" cy="720" r="2" fill="#00f0ff" opacity="0.35"/>
    <circle cx="1050" cy="300" r="3" fill="#7b2ff7" opacity="0.25"/>
    <circle cx="1750" cy="300" r="2" fill="#00f0ff" opacity="0.3"/>
    <circle cx="100" cy="700" r="2.5" fill="#ff2d75" opacity="0.2"/>
    <circle cx="600" cy="900" r="2" fill="#00f0ff" opacity="0.25"/>
    <circle cx="1400" cy="950" r="3" fill="#7b2ff7" opacity="0.2"/>
  </g>

  <!-- Circuit-like lines at bottom -->
  <g stroke="#00f0ff" stroke-width="0.8" opacity="0.08" fill="none">
    <path d="M0,1020 L80,1020 L100,1000 L200,1000 L220,980 L350,980"/>
    <path d="M1920,1040 L1820,1040 L1800,1020 L1680,1020 L1660,1000 L1520,1000"/>
    <path d="M500,1060 L520,1040 L650,1040 L670,1020 L800,1020"/>
    <path d="M1100,1070 L1120,1050 L1250,1050 L1270,1030 L1420,1030"/>
    <!-- Connection dots -->
    <circle cx="350" cy="980" r="3" fill="#00f0ff" opacity="0.3"/>
    <circle cx="1520" cy="1000" r="3" fill="#00f0ff" opacity="0.3"/>
    <circle cx="800" cy="1020" r="3" fill="#00f0ff" opacity="0.3"/>
    <circle cx="1420" cy="1030" r="3" fill="#00f0ff" opacity="0.3"/>
  </g>

  <!-- Binary/code rain effect (subtle) -->
  <g font-family="monospace" font-size="10" fill="#00f0ff" opacity="0.04" letter-spacing="2">
    <text x="50" y="400">01001 10110 00101</text>
    <text x="1650" y="500">11010 01100 10101</text>
    <text x="800" y="950">10010 01011 11100</text>
    <text x="1300" y="700">00110 10011 01010</text>
    <text x="300" y="650">11101 00011 11001</text>
  </g>

  <!-- AI Brain / Neural network central element -->
  <g transform="translate(920, 480)" filter="url(#glowPurple)" opacity="0.05">
    <ellipse cx="40" cy="30" rx="35" ry="25" fill="none" stroke="#7b2ff7" stroke-width="1"/>
    <ellipse cx="40" cy="30" rx="25" ry="18" fill="none" stroke="#7b2ff7" stroke-width="0.8"/>
    <!-- Neural paths inside brain -->
    <path d="M15,25 Q25,15 40,22 Q55,15 65,28" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.5"/>
    <path d="M18,35 Q28,42 40,35 Q52,42 62,33" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.5"/>
    <path d="M40,8 L40,50" fill="none" stroke="#ff2d75" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Subtle hexagon grid pattern overlay -->
  <g transform="translate(1400, 100)" opacity="0.04">
    <polygon points="30,0 60,17 60,53 30,70 0,53 0,17" fill="none" stroke="#7b2ff7" stroke-width="1"/>
    <polygon points="90,0 120,17 120,53 90,70 60,53 60,17" fill="none" stroke="#7b2ff7" stroke-width="1"/>
    <polygon points="60,52 90,69 90,105 60,122 30,105 30,69" fill="none" stroke="#7b2ff7" stroke-width="1"/>
  </g>

  <!-- Top right corner accent -->
  <g transform="translate(1780, 20)" opacity="0.06">
    <rect x="0" y="0" width="100" height="100" fill="none" stroke="#00f0ff" stroke-width="1"/>
    <line x1="0" y1="30" x2="100" y2="30" stroke="#00f0ff" stroke-width="0.5"/>
    <line x1="30" y1="0" x2="30" y2="100" stroke="#00f0ff" stroke-width="0.5"/>
  </g>

  <!-- Bottom left corner accent -->
  <g transform="translate(20, 960)" opacity="0.06">
    <rect x="0" y="0" width="80" height="80" fill="none" stroke="#7b2ff7" stroke-width="1"/>
    <line x1="0" y1="27" x2="80" y2="27" stroke="#7b2ff7" stroke-width="0.5"/>
    <line x1="27" y1="0" x2="27" y2="80" stroke="#7b2ff7" stroke-width="0.5"/>
  </g>
</svg>