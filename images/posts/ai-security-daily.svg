<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0d0828"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4361ee"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4361ee" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4361ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>

  <!-- Grid pattern -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="650" cy="80" r="120" fill="#4361ee" fill-opacity="0.06" filter="url(#glow)"/>
  <circle cx="150" cy="320" r="100" fill="#7c3aed" fill-opacity="0.05" filter="url(#glow)"/>
  <circle cx="400" cy="200" r="150" fill="#db2777" fill-opacity="0.03" filter="url(#glow)"/>

  <!-- Central AI Brain / Shield Icon -->
  <g transform="translate(400, 180)" filter="url(#glow)">
    <!-- Shield outline -->
    <path d="M0,-60 C-35,-60 -55,-30 -55,0 C-55,45 -20,70 0,85 C20,70 55,45 55,0 C55,-30 35,-60 0,-60Z"
          fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-opacity="0.8"/>
    
    <!-- Inner circuit lines -->
    <path d="M0,-45 C-25,-45 -40,-22 -40,0 C-40,33 -15,52 0,64 C15,52 40,33 40,0 C40,-22 25,-45 0,-45Z"
          fill="none" stroke="#4361ee" stroke-width="1" stroke-opacity="0.3"/>
    <path d="M0,-28 C-15,-28 -24,-12 -24,0 C-24,18 -9,30 0,38 C9,30 24,18 24,0 C24,-12 15,-28 0,-28Z"
          fill="none" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.25"/>
    
    <!-- AI Core nodes -->
    <circle cx="0" cy="-10" r="5" fill="#4361ee" fill-opacity="0.9">
      <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-22" cy="8" r="4" fill="#7c3aed" fill-opacity="0.8">
      <animate attributeName="r" values="4;6;4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="22" cy="8" r="4" fill="#db2777" fill-opacity="0.8">
      <animate attributeName="r" values="4;6;4" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-12" cy="28" r="3" fill="#4f6ef7" fill-opacity="0.7">
      <animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="12" cy="28" r="3" fill="#4f6ef7" fill-opacity="0.7">
      <animate attributeName="r" values="3;5;3" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Connection lines -->
    <line x1="0" y1="-10" x2="-22" y2="8" stroke="#4361ee" stroke-opacity="0.2" stroke-width="1"/>
    <line x1="0" y1="-10" x2="22" y2="8" stroke="#4361ee" stroke-opacity="0.2" stroke-width="1"/>
    <line x1="-22" y1="8" x2="-12" y2="28" stroke="#7c3aed" stroke-opacity="0.15" stroke-width="1"/>
    <line x1="22" y1="8" x2="12" y2="28" stroke="#db2777" stroke-opacity="0.15" stroke-width="1"/>
    <line x1="-12" y1="28" x2="12" y2="28" stroke="#4f6ef7" stroke-opacity="0.15" stroke-width="1"/>
    
    <!-- Lock/Security icon at center -->
    <g transform="translate(0, 5)">
      <rect x="-10" y="-8" width="20" height="14" rx="2" fill="none" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.9"/>
      <path d="M-5,-8 L-5,-13 C-5,-16 5,-16 5,-13 L5,-8" fill="none" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.9"/>
      <circle cx="0" cy="0" r="2.5" fill="#00f0ff" fill-opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.4;0.9" dur="1.5s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- Floating particles -->
  <g fill="#4361ee" fill-opacity="0.4">
    <circle cx="120" cy="100" r="2"><animate attributeName="cy" values="100;90;100" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="680" cy="140" r="1.5"><animate attributeName="cy" values="140;155;140" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="300" r="2.5"><animate attributeName="cy" values="300;285;300" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="620" cy="280" r="2"><animate attributeName="cy" values="280;295;280" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="100" cy="220" r="1.5"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="250" r="2"><animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/></circle>
  </g>
  <g fill="#7c3aed" fill-opacity="0.3">
    <circle cx="160" cy="150" r="1.5"><animate attributeName="cx" values="160;170;160" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="640" cy="100" r="2"><animate attributeName="cx" values="640;625;640" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="720" cy="320" r="1.5"><animate attributeName="cx" values="720;730;720" dur="5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Title text area -->
  <text x="400" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="url(#accent)" letter-spacing="1">
    AI SECURITY
  </text>
  <text x="400" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8888a8" letter-spacing="3" text-transform="uppercase">
    Daily Digest
  </text>

  <!-- Binary decoration -->
  <text x="40" y="380" font-family="monospace" font-size="9" fill="#4361ee" fill-opacity="0.2">01001</text>
  <text x="90" y="380" font-family="monospace" font-size="9" fill="#7c3aed" fill-opacity="0.15">11010</text>
  <text x="680" y="380" font-family="monospace" font-size="9" fill="#db2777" fill-opacity="0.2">10110</text>
  <text x="730" y="380" font-family="monospace" font-size="9" fill="#4f6ef7" fill-opacity="0.15">01101</text>
</svg>
