<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" width="128" height="96" shape-rendering="crispEdges">
  <defs>
    <style>
      .cw{animation:wk 10s ease-in-out infinite}
      @keyframes wk{0%,100%{transform:translateX(0)}30%{transform:translateX(16px)}60%{transform:translateX(0)}80%{transform:translateX(-10px)}}
      .tl{transform-origin:140px 95px;animation:tlw 2s ease-in-out infinite}
      @keyframes tlw{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(22deg)}}
      .eye{animation:bk 4s ease-in-out infinite}
      @keyframes bk{0%,46%,48%,100%{transform:scaleY(1)}47%{transform:scaleY(0.1)}}
      .bd{animation:bth 3s ease-in-out infinite}
      @keyframes bth{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.03)}}
      .fl{animation:pwl 5s ease-in-out infinite}
      .fr{animation:pwr 5s ease-in-out infinite .6s}
      @keyframes pwl{0%,70%,100%{transform:translateY(0)}75%,85%{transform:translateY(-2px)}}
      @keyframes pwr{0%,70%,100%{transform:translateY(0)}75%,85%{transform:translateY(-2px)}}
      .hd{animation:nd 12s ease-in-out infinite}
      @keyframes nd{0%,65%,85%,100%{transform:rotate(0)}72%,80%{transform:rotate(4deg)}}
      .zz{opacity:0;animation:zAn 8s ease-in-out infinite}
      @keyframes zAn{0%,25%{opacity:0;transform:translate(0,0) scale(.5)}30%{opacity:.8;transform:translate(8px,-14px) scale(1)}45%{opacity:.8;transform:translate(14px,-26px) scale(1.1)}50%,80%{opacity:0}81%,100%{opacity:0}}
    </style>
  </defs>
  <g class="cw" fill="#DAA554">
    <!-- tail -->
    <g class="tl"><rect x="138" y="82" width="4" height="16" rx="2"/><rect x="142" y="76" width="4" height="12" rx="2"/><rect x="144" y="68" width="4" height="10" rx="2"/><rect x="144" y="60" width="3" height="8" rx="1"/></g>
    <!-- back legs -->
    <rect x="46" y="98" width="10" height="14" rx="3" fill="#C9933F"/>
    <rect x="102" y="98" width="10" height="14" rx="3" fill="#C9933F"/>
    <!-- body - chubby pixel cat -->
    <g class="bd">
      <rect x="44" y="64" width="72" height="42" rx="12" fill="#DAA554"/>
      <rect x="52" y="74" width="40" height="28" rx="8" fill="#F0D9A8" opacity=".7"/>
      <!-- belly stripe pattern -->
      <rect x="68" y="78" width="8" height="20" rx="2" fill="#E8B87A" opacity=".4"/>
    </g>
    <!-- front legs standing -->
    <g class="fl"><rect x="52" y="94" width="8" height="18" rx="3" fill="#DAA554"/><rect x="53" y="106" width="6" height="6" rx="2" fill="#F0D9A8"/></g>
    <g class="fr"><rect x="100" y="94" width="8" height="18" rx="3" fill="#DAA554"/><rect x="101" y="106" width="6" height="6" rx="2" fill="#F0D9A8"/></g>
    <!-- head group -->
    <g class="hd">
      <!-- ears -->
      <polygon points="54,48 46,24 66,40" fill="#DAA554"/>
      <polygon points="56,42 50,28 63,39" fill="#FF9999"/>
      <polygon points="106,48 114,24 94,40" fill="#DAA554"/>
      <polygon points="104,42 110,28 97,39" fill="#FF9999"/>
      <!-- head base -->
      <rect x="50" y="36" width="60" height="38" rx="16" fill="#DAA554"/>
      <!-- lighter face area -->
      <rect x="62" y="50" width="36" height="22" rx="10" fill="#F0D9A8" opacity=".55"/>
      <!-- eyes - big and cute -->
      <g class="eye" style="transform-origin:70px 48px;">
        <rect x="64" y="44" width="8" height="9" rx="3" fill="#558B2F"/>
        <rect x="66" y="45" width="3" height="4" rx="1" fill="#1a1a1a"/>
        <rect x="67" y="44" width="2" height="2" fill="#fff"/>
        <rect x="65" y="49" width="1" height="1" fill="#fff" opacity=".5"/>
      </g>
      <g class="eye" style="transform-origin:92px 48px;">
        <rect x="88" y="44" width="8" height="9" rx="3" fill="#558B2F"/>
        <rect x="90" y="45" width="3" height="4" rx="1" fill="#1a1a1a"/>
        <rect x="91" y="44" width="2" height="2" fill="#fff"/>
        <rect x="89" y="49" width="1" height="1" fill="#fff" opacity=".5"/>
      </g>
      <!-- nose -->
      <rect x="77" y="58" width="6" height="4" rx="1" fill="#FF8888"/>
      <!-- mouth -->
      <rect x="77" y="64" width="2" height="3" fill="#C9933F" opacity=".5"/>
      <rect x="81" y="64" width="2" height="3" fill="#C9933F" opacity=".5"/>
      <!-- whiskers -->
      <rect x="46" y="58" width="10" height="1" fill="#C9933F" opacity=".4"/>
      <rect x="44" y="64" width="12" height="1" fill="#C9933F" opacity=".4"/>
      <rect x="46" y="70" width="10" height="1" fill="#C9933F" opacity=".4"/>
      <rect x="104" y="58" width="10" height="1" fill="#C9933F" opacity=".4"/>
      <rect x="104" y="64" width="12" height="1" fill="#C9933F" opacity=".4"/>
      <rect x="104" y="70" width="10" height="1" fill="#C9933F" opacity=".4"/>
    </g>
    <!-- Zzz sleep symbols -->
    <text class="zz" x="125" y="32" font-family="monospace" font-size="11" font-weight="bold" fill="#00f0ff">z</text>
    <text class="zz" style="animation-delay:.5s" x="134" y="22" font-family="monospace" font-size="9" font-weight="bold" fill="#00f0ff">z</text>
    <text class="zz" style="animation-delay:1s" x="141" y="14" font-family="monospace" font-size="7" font-weight="bold" fill="#00f0ff">z</text>
  </g>
</svg>
