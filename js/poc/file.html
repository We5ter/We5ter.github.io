<button id="butDirectory" onclick="javascript:poc()">click me</button>
<script>
  function poc(){
  const dir_ref =  window.showDirectoryPicker();
if (!dir_ref) {
    // User cancelled, or otherwise failed to open a directory.
    return;
}

// No special API to create copies, but still possible to do so by using
// available read and write APIs.
const new_file =  dir_ref.getFile('zzy.txt', {create: true});
const new_file_writer =  new_file.createWritable();
await new_file_writer.write("xxxxx");
await new_file_writer.close();
  }
</script>
