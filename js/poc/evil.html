<html>
  <head>
    <title>demo</title>
    <link rel="manifest" href="../pay/manifest.json">
  </head>
  <body>
<button onclick="onBuyClicked()">Buy</button>
  </body>
   <script>
function buildPaymentRequest() {
  if (!window.PaymentRequest) {
    return null;
  }

  const supportedInstruments = [{
    supportedMethods: 'https://lightrains.org/js/pay'
  }
  ];

  const details = {
    total: {
      label: 'Donation',
      amount: {
        currency: 'USD',
        value: '55.00',
      },
    },
    displayItems: [{
      label: 'Original donation amount',
      amount: {
        currency: 'USD',
        value: '65.00',
      },
    }, {
      label: 'Friends and family discount',
      amount: {
        currency: 'USD',
        value: '-10.00',
      },
    }],
  };

  let request = null;

  try {
    request = new PaymentRequest(supportedInstruments, details);
    if (request.canMakePayment) {
      request.canMakePayment().then(function(result) {
        console.log(result ? 'Can make payment' : 'Cannot make payment');
      }).catch(function(err) {
        console.log(err);
      });
    }
  } catch (e) {
    console.log('Developer mistake: \'' + e.message + '\'');
  }

  return request;
}

let request = buildPaymentRequest();

/**
 * Handles the response from PaymentRequest.show().
 */
function handlePaymentResponse(response) {
  window.setTimeout(function() {
    response.complete('success')
      .then(function() {
        done('This is a demo website. No payment will be processed.', response);
      })
      .catch(function(err) {
        console.log(err);
        request = buildPaymentRequest();
      });
  }, 500);
}

/**
 * Launches payment request for Bob Pay.
 */
function onBuyClicked() { // eslint-disable-line no-unused-vars
  if (!window.PaymentRequest || !request) {
    console.log('PaymentRequest API is not supported.');
    return;
  }

  try {
    request.show()
      .then(handlePaymentResponse)
      .catch(function(err) {
        console.log(err);
        request = buildPaymentRequest();
      });
  } catch (e) {
    console.log('Developer mistake: \'' + e.message + '\'');
    request = buildPaymentRequest();
  }
}
</script>
</html>
