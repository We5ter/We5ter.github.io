<!DOCTYPE html>
<html>
<head>
<style>
.scaled {
  transform: scale(-200); /* Equal to scaleX(0.7) scaleY(0.7) */
  background-color: pink;
}
</style>
</head>
<body>

<select class="scaled">
  <option value="volvo">Volvo</option>
  <option value="saab">Saab</option>
  <option value="opel">Opel</option>
  <option value="audi">Audi</option>
</select>
  
</body>
</html>
