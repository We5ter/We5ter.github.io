<script>
fetch('/repositories.json')
  .then(r => r.json())
  .then(repos => {
    const list = document.getElementById('repo-grid');
    repos.forEach(repo => {
      const bgStyle = repo.backgroundType === 'gradient'
        ? repo.backgroundValue
        : `url('${repo.background}')`;

      // Extract owner/repo from GitHub URL for API call
      const match = repo.repoUrl.match(/github\.com\/([^/]+)\/([^/]+)/);
      const apiOwner = match ? match[1] : '';
      const apiRepo = match ? match[2] : '';

      const card = document.createElement('div');
      card.className = 'repo-card';
      card.style.setProperty('--card-bg', bgStyle);
      card.onclick = () => window.open(repo.repoUrl, '_blank');

      card.innerHTML = `
        <div class="repo-logo-wrap">
          <img src="${repo.logo}" alt="${repo.title} logo" loading="lazy">
        </div>
        <div class="repo-info">
          <h3>${repo.title}</h3>
          <p class="repo-desc">${repo.description}</p>
          <div class="repo-meta">
            <span class="repo-stars" data-repo-owner="${apiOwner}" data-repo-name="${apiRepo}">⭐ ...</span>
            <span class="repo-forks" data-fork-owner="${apiOwner}" data-fork-name="${apiRepo}"><svg class="fork-icon" viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M5 5.372v.878c0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75v-.878a2.25 2.25 0 1 1 1.5 0v.878a2.25 2.25 0 0 1-2.25 2.25h-1.5v2.128a2.251 2.251 0 1 1-1.5 0V8.5h-1.5A2.25 2.25 0 0 1 3.5 6.25v-.878a2.25 2.25 0 1 1 1.5 0ZM5 3.25a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Zm6.75.75a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm-3 8.75a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Z"></path></svg> ...</span>
            <span class="repo-author">${repo.author}</span>
            <span class="repo-link"><a href="${repo.repoUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 GitHub</a></span>
          </div>
        </div>`;

      list.appendChild(card);

      // Fetch real-time stars & forks from GitHub API
      if (apiOwner && apiRepo) {
        fetch(`https://api.github.com/repos/${apiOwner}/${apiRepo}`)
          .then(r => r.json())
          .then(data => {
            if (!data.message) {
              const starsEl = card.querySelector('.repo-stars');
              const forksEl = card.querySelector('.repo-forks');
              if (starsEl) starsEl.innerHTML = `⭐ ${formatNumber(data.stargazers_count)}`;
              if (forksEl) forksEl.innerHTML = `<svg class="fork-icon" viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M5 5.372v.878c0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75v-.878a2.25 2.25 0 1 1 1.5 0v.878a2.25 2.25 0 0 1-2.25 2.25h-1.5v2.128a2.251 2.251 0 1 1-1.5 0V8.5h-1.5A2.25 2.25 0 0 1 3.5 6.25v-.878a2.25 2.25 0 1 1 1.5 0ZM5 3.25a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Zm6.75.75a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm-3 8.75a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Z"></path></svg> ${formatNumber(data.forks_count)}`;
            }
          })
          .catch(() => {});
      }
    });
  })
  .catch(err => console.error('Failed to load repos:', err));

function formatNumber(n) {
  if (n >= 10000) return (n / 1000).toFixed(1) + 'k';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return n.toString();
}
</script>

<!-- Theme Toggle: Dark / Light Mode -->
<script>
(function() {
  const toggle = document.getElementById('theme-toggle');
  if (!toggle) return;

  // Get saved theme or default to dark
  const savedTheme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);

  // Sync Giscus theme with site theme
  function syncGiscusTheme(theme) {
    const giscusFrame = document.querySelector('.giscus iframe');
    if (!giscusFrame) return false;
    const giscusTheme = theme === 'light' ? 'light' : 'dark_dimmed';
    giscusFrame.contentWindow.postMessage(
      { giscus: { setConfig: { theme: giscusTheme } } },
      'https://giscus.app'
    );
    return true;
  }

  // Set initial Giscus theme with retry (iframe may not be ready yet)
  function syncGiscusWithRetry(theme, attempts) {
    if (attempts === undefined) attempts = 0;
    if (syncGiscusTheme(theme)) return;
    if (attempts < 20) {
      setTimeout(function() { syncGiscusWithRetry(theme, attempts + 1); }, 300);
    }
  }
  syncGiscusWithRetry(savedTheme);

  // Also watch for Giscus iframe insertion via MutationObserver
  var giscusObserver = new MutationObserver(function(mutations) {
    for (var i = 0; i < mutations.length; i++) {
      for (var j = 0; j < mutations[i].addedNodes.length; j++) {
        var node = mutations[i].addedNodes[j];
        if (node.nodeType === 1 && (node.classList && node.classList.contains('giscus') ||
            (node.querySelector && node.querySelector('.giscus')))) {
          // Giscus container added, wait a tick then sync
          var currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
          setTimeout(function() { syncGiscusTheme(currentTheme); }, 500);
        }
      }
    }
  });
  if (document.body) {
    giscusObserver.observe(document.body, { childList: true, subtree: true });
  }

  toggle.addEventListener('click', function() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    syncGiscusTheme(next);
  });

  // Listen for Giscus messages (e.g., when user changes theme in Giscus)
  window.addEventListener('message', function(event) {
    if (event.origin !== 'https://giscus.app') return;
    if (!(typeof event.data === 'object' && event.data.giscus)) return;
    const giscusData = event.data.giscus;
    if ('theme' in giscusData) {
      const newTheme = giscusData.theme.includes('light') ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    }
  });

  // Always default to dark mode; only change when user manually toggles
  // Clearing browser data resets to dark (since no saved preference → fallback 'dark')
  if (!localStorage.getItem('theme')) {
    localStorage.setItem('theme', 'dark');
  }
})();
</script>

<!-- Meteor Shower Animation for Hero Area -->
<script>
(function() {
    var siteHead = document.querySelector('.site-head');
    if (!siteHead) return;

    // Create meteor container
    var shower = document.createElement('div');
    shower.className = 'meteor-shower';
    siteHead.appendChild(shower);

    // Meteor color configs for dark/light mode
    function getColors() {
        var isLight = document.documentElement.getAttribute('data-theme') === 'light';
        return isLight ? [
            { color: '#6366f1', glow: 'rgba(99,102,241,0.35)' },
            { color: '#a855f7', glow: 'rgba(168,85,247,0.30)' },
            { color: '#ec4899', glow: 'rgba(236,72,153,0.25)' },
            { color: '#818cf8', glow: 'rgba(129,140,248,0.28)' }
        ] : [
            { color: '#00f0ff', glow: 'rgba(0,240,255,0.45)' },
            { color: '#a855f7', glow: 'rgba(168,85,247,0.40)' },
            { color: '#7dd3fc', glow: 'rgba(125,211,252,0.35)' },
            { color: '#c084fc', glow: 'rgba(192,132,252,0.35)' },
            { color: '#22d3ee', glow: 'rgba(34,211,238,0.40)' }
        ];
    }

    function createMeteor() {
        var colors = getColors();
        var el = document.createElement('div');
        el.className = 'meteor';

        // Random config
        var cfg = colors[Math.floor(Math.random() * colors.length)];
        var length = 100 + Math.random() * 150; // 100-250px length
        var thickness = 1 + Math.random() * 1.5; // 1-2.5px thick
        var duration = 1.2 + Math.random() * 2; // 1.2-3.2s
        var delay = Math.random() * 4; // 0-4s delay

        // Fixed diagonal angle: NW to SE (top-left to bottom-right, 45-65 degrees)
        var angle = 45 + Math.random() * 20; // 45-65 deg from horizontal

        // Start position: upper-left area of the hero (NW)
        var startX = -10 + Math.random() * 40; // -10% ~ 30% from left
        var startY = -5 - Math.random() * 15; // above top edge

        // Travel distance based on angle (SE direction: right + down)
        var travelDist = 350 + Math.random() * 400;
        var rad = angle * (Math.PI / 180);
        var travelX = travelDist * Math.cos(rad); // positive = go right (East)
        var travelY = travelDist * Math.sin(rad);  // positive = go down (South)

        el.style.cssText =
            '--meteor-color:' + cfg.color + ';' +
            '--meteor-glow:' + cfg.glow + ';' +
            '--tx:' + travelX + 'px;' +
            '--ty:' + travelY + 'px;' +
            'width:' + length + 'px;' +
            'height:' + thickness + 'px;' +
            'left:' + startX + '%;' +
            'top:' + startY + '%;' +
            'transform:rotate(' + angle + 'deg);' +
            'animation:meteorShoot ' + duration + 's ease-out ' + delay + 's forwards;';

        shower.appendChild(el);

        // Remove after animation ends
        setTimeout(function() {
            if (el.parentNode) el.parentNode.removeChild(el);
        }, (duration + delay) * 1000 + 500);
    }

    // Initial burst
    for (var i = 0; i < 3; i++) {
        createMeteor();
    }

    // Continuous meteors
    setInterval(function() {
        if (shower.children.length < 4) {
            createMeteor();
        }
    }, 2200);

    // Occasional double meteor
    setInterval(function() {
        createMeteor();
        setTimeout(createMeteor, 120 + Math.random() * 250);
    }, 7000 + Math.random() * 5000);
})();
</script>

<!-- Back to Top Button: show on scroll, click to scroll to top -->
<script>
(function() {
    var btn = document.getElementById('back-to-top-btn');
    if (!btn) return;

    btn.addEventListener('click', function(e) {
        e.preventDefault();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Show button when scrolled down past 300px
    window.addEventListener('scroll', function() {
        var st = window.pageYOffset || document.documentElement.scrollTop;
        if (st > 300) {
            btn.classList.add('is-visible');
        } else {
            btn.classList.remove('is-visible');
        }
    }, { passive: true });
})();
</script>

<script>
(function() {
    var hamburger = document.getElementById('navbar-hamburger');
    var mobileMenu = document.getElementById('navbar-mobile-menu');
    if (!hamburger || !mobileMenu) return;

    hamburger.addEventListener('click', function() {

        hamburger.classList.toggle('active', isOpen);
    });

    // Close menu when clicking a link

        links[i].addEventListener('click', function() {
            mobileMenu.classList.remove('is-open');

    // Close menu on outside click
    document.addEventListener('click', function(e) {
        if (!hamburger.contains(e.target) && !mobileMenu.contains(e.target)) {
            mobileMenu.classList.remove('is-open');
            hamburger.classList.remove('active');
        }
    });
})();
</script>

</body>
</html>
